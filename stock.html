<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock — Q360 AI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="shared.css">
<style>
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="main-wrapper">
  <div class="main-header">
    <div>
      <div class="header-title">Stock</div>
      <div class="header-sub">Simamia bidhaa na vifaa vya biashara yako</div>
    </div>
    <div class="header-right">
      <a href="ai.html" class="btn btn-ai btn-sm"><i class="ti ti-brand-openai"></i> Uliza AI</a>
      <button class="btn btn-gold" onclick="openAdd()"><i class="ti ti-plus"></i> Ongeza Bidhaa</button>
    </div>
  </div>

  <div class="main-content">
    <!-- AI Insight -->
    <div id="aiInsight" style="display:none;background:linear-gradient(135deg,var(--navy),var(--navy-light));border-radius:var(--radius-lg);border:1px solid var(--cyan-border);padding:16px 20px;margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <i class="ti ti-brand-openai" style="color:var(--cyan);font-size:16px"></i>
        <span style="font-size:11px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:0.5px">Q360 AI — Hali ya Stock</span>
      </div>
      <div id="aiInsightText" style="font-size:13px;color:var(--text-white);line-height:1.65"></div>
    </div>

    <!-- Alert -->
    <div id="alertBox"></div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid" style="margin-bottom:20px"></div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-card-header">
        <div>
          <div class="table-card-title">Orodha ya Bidhaa</div>
          <div class="table-card-sub">Bidhaa zako zote za biashara</div>
        </div>
        <div class="table-actions">
          <div class="search-box"><i class="ti ti-search"></i><input id="searchInput" placeholder="Tafuta bidhaa..." oninput="filterTable(this.value)"></div>
          <div class="filter-row" style="margin:0">
            <button class="filter-btn active" onclick="filterByStatus('all',this)">Zote</button>
            <button class="filter-btn" onclick="filterByStatus('low',this)">Inakwisha</button>
            <button class="filter-btn" onclick="filterByStatus('out',this)">Imeisha</button>
          </div>
        </div>
      </div>
      <div id="tableWrap"></div>
    </div>
  </div>
</div>

<!-- MODAL: Add/Edit -->
<div class="modal-overlay" id="modalBidhaa">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Ongeza Bidhaa Mpya</div>
      <button class="modal-close" onclick="closeModal('modalBidhaa')"><i class="ti ti-x"></i></button>
    </div>
    <div class="alert alert-danger" id="modalError" style="display:none"><i class="ti ti-alert-circle"></i><span id="modalErrorMsg"></span></div>
    <div class="form-group"><label class="form-label">Jina la Bidhaa *</label><input class="form-control" id="fJina" placeholder="Mfano: Unga wa Selela 2kg"></div>
    <div class="form-group">
      <label class="form-label">Kategoria</label>
      <select class="form-control" id="fKat">
        <option>Chakula</option><option>Vinywaji</option><option>Nguo</option>
        <option>Vifaa</option><option>Dawa</option><option>Elektroniki</option><option>Nyingine</option>
      </select>
    </div>
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Idadi Iliyopo</label><input type="number" class="form-control" id="fIdadi" placeholder="0" min="0"></div>
      <div class="form-group"><label class="form-label">Kiwango cha Chini</label><input type="number" class="form-control" id="fKiwango" value="10" min="0"></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Bei ya Kununua (TZS)</label><input type="number" class="form-control" id="fBeiKununua" placeholder="0"></div>
      <div class="form-group"><label class="form-label">Bei ya Kuuza (TZS) *</label><input type="number" class="form-control" id="fBeiKuuza" placeholder="0"></div>
    </div>
    <button class="btn btn-gold" id="saveBtn" style="width:100%;justify-content:center;padding:12px" onclick="saveBidhaa()"><i class="ti ti-check"></i> Hifadhi Bidhaa</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
let allStock = [];
let editingId = null;
let currentStatusFilter = 'all';

(async () => {
  const session = await Auth.getSession();
  if (!session) { window.location.replace('login.html'); return; }
  await loadSidebar('stock');
  await loadStock();
})();

async function loadStock() {
  allStock = await DB.stock.getAll();
  const total = allStock.reduce((a,s)=>a+Number(s.idadi),0);
  const thamani = allStock.reduce((a,s)=>a+(Number(s.idadi)*Number(s.bei_kuuza||s.bei_mauzo||0)),0);
  const low = allStock.filter(s=>Number(s.idadi)>0&&Number(s.idadi)<=Number(s.kiwango_chini)).length;
  const nje = allStock.filter(s=>Number(s.idadi)===0).length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Bidhaa Zote</div><div class="stat-value">${allStock.length}</div><div class="stat-sub">${total} vitu jumla</div></div>
    <div class="stat-card"><div class="stat-label">Thamani ya Stock</div><div class="stat-value" style="font-size:16px">${formatTZS(thamani)}</div><div class="stat-sub">Bei ya kuuza</div></div>
    <div class="stat-card"><div class="stat-label">Inakwisha</div><div class="stat-value" style="color:${low>0?'var(--warning)':'var(--gold)'}">${low}</div><div class="stat-sub">Chini ya kiwango</div></div>
    <div class="stat-card"><div class="stat-label">Imeisha Kabisa</div><div class="stat-value" style="color:${nje>0?'var(--danger)':'var(--gold)'}">${nje}</div><div class="stat-sub">Zinahitaji kujazwa</div></div>`;

  document.getElementById('alertBox').innerHTML = (low>0||nje>0)
    ? `<div class="alert alert-warning"><i class="ti ti-alert-triangle" style="font-size:18px"></i><strong>${nje} bidhaa zimeisha</strong> na <strong>${low} zinakwisha</strong> — jaza hivi karibuni</div>`
    : '';

  // AI Insight
  const insight = document.getElementById('aiInsight');
  const insightText = document.getElementById('aiInsightText');
  if (nje > 0 || low > 0) {
    const names = allStock.filter(s=>Number(s.idadi)<=Number(s.kiwango_chini)).slice(0,3).map(s=>s.jina).join(', ');
    insightText.innerHTML = `⚠️ Bidhaa <strong>${nje+low}</strong> zinahitaji kujazwa: <strong>${names}</strong>. ${thamani>0?`Thamani ya stock yako yote ni <strong>${formatTZS(thamani)}</strong>.`:''}`;
    insight.style.display = 'block';
  } else if (allStock.length > 0) {
    insightText.innerHTML = `✅ Stock yako iko sawa! Bidhaa <strong>${allStock.length}</strong>, thamani yake yote ni <strong>${formatTZS(thamani)}</strong>. Endelea kufuatilia.`;
    insight.style.display = 'block';
  }

  renderTable(getFiltered());
}

function getFiltered() {
  let stock = allStock;
  if (currentStatusFilter === 'low') stock = allStock.filter(s=>Number(s.idadi)>0&&Number(s.idadi)<=Number(s.kiwango_chini));
  else if (currentStatusFilter === 'out') stock = allStock.filter(s=>Number(s.idadi)===0);
  const q = document.getElementById('searchInput')?.value.toLowerCase();
  if (q) stock = stock.filter(s=>s.jina.toLowerCase().includes(q));
  return stock;
}

function filterTable(q) { renderTable(getFiltered()); }
function filterByStatus(status, btn) {
  currentStatusFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(getFiltered());
}

function renderTable(stock) {
  if (!stock.length) {
    document.getElementById('tableWrap').innerHTML = `<div style="text-align:center;padding:48px;color:var(--text-muted)"><i class="ti ti-package" style="font-size:40px;display:block;margin-bottom:12px;color:var(--border)"></i><div style="font-weight:600;margin-bottom:6px">Hakuna bidhaa</div><button class="btn btn-gold btn-sm" onclick="openAdd()"><i class="ti ti-plus"></i> Ongeza Bidhaa</button></div>`;
    return;
  }
  document.getElementById('tableWrap').innerHTML = `<table><thead><tr><th>Bidhaa</th><th>Kategoria</th><th>Kiwango</th><th>Hali</th><th>Bei Kuuza</th><th>Thamani</th><th></th></tr></thead><tbody>
    ${stock.map(s=>{
      const bei = Number(s.bei_kuuza||s.bei_mauzo||0);
      const idadi = Number(s.idadi);
      const max = Math.max(Number(s.kiwango_chini)*3,idadi,30);
      const pct = Math.min((idadi/max)*100,100);
      const isOut = idadi===0;
      const isLow = !isOut&&idadi<=Number(s.kiwango_chini);
      const color = isOut?'var(--danger)':isLow?'var(--warning)':'var(--navy)';
      const badge = isOut?'badge-danger':isLow?'badge-warning':'badge-success';
      const label = isOut?'Imeisha':isLow?'Inakwisha':'Inatosha';
      return `<tr>
        <td><div style="font-weight:600;color:var(--navy)">${s.jina}</div></td>
        <td><span class="badge badge-info">${s.kategoria||'Nyingine'}</span></td>
        <td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div><span style="font-size:11px;color:var(--text-muted);white-space:nowrap">${idadi}</span></div></td>
        <td><span class="badge ${badge}">${label}</span></td>
        <td class="text-gold font-bold">${formatTZS(bei)}</td>
        <td class="font-bold">${formatTZS(idadi*bei)}</td>
        <td><div style="display:flex;gap:6px"><button class="btn btn-outline btn-sm" onclick="editBidhaa(${s.id})"><i class="ti ti-edit"></i></button><button class="btn btn-danger btn-sm" onclick="deleteBidhaa(${s.id})"><i class="ti ti-trash"></i></button></div></td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

function openAdd(){editingId=null;resetForm();document.getElementById('modalTitle').textContent='Ongeza Bidhaa Mpya';document.getElementById('saveBtn').innerHTML='<i class="ti ti-check"></i> Hifadhi Bidhaa';hideModalError();openModal('modalBidhaa');}
function editBidhaa(id){const s=allStock.find(s=>s.id===id);if(!s)return;editingId=id;document.getElementById('fJina').value=s.jina||'';document.getElementById('fKat').value=s.kategoria||'Nyingine';document.getElementById('fIdadi').value=s.idadi||0;document.getElementById('fBeiKununua').value=s.bei_kununua||0;document.getElementById('fBeiKuuza').value=s.bei_kuuza||s.bei_mauzo||0;document.getElementById('fKiwango').value=s.kiwango_chini||10;document.getElementById('modalTitle').textContent='Hariri Bidhaa';hideModalError();openModal('modalBidhaa');}
function resetForm(){editingId=null;['fJina','fIdadi','fBeiKununua','fBeiKuuza'].forEach(id=>document.getElementById(id).value='');document.getElementById('fKat').value='Chakula';document.getElementById('fKiwango').value='10';hideModalError();}

async function saveBidhaa(){
  const jina=document.getElementById('fJina').value.trim();
  const bei_kuuza=parseFloat(document.getElementById('fBeiKuuza').value)||0;
  const idadi=parseFloat(document.getElementById('fIdadi').value)||0;
  if(!jina){showModalError('Jaza jina la bidhaa');return;}
  if(!bei_kuuza){showModalError('Jaza bei ya kuuza');return;}
  const btn=document.getElementById('saveBtn');
  btn.innerHTML='<i class="ti ti-loader-2" style="animation:spin 0.8s linear infinite"></i> Inahifadhi...';
  btn.style.pointerEvents='none';
  const data={jina,kategoria:document.getElementById('fKat').value,idadi,bei_kununua:parseFloat(document.getElementById('fBeiKununua').value)||0,bei_kuuza,kiwango_chini:parseFloat(document.getElementById('fKiwango').value)||10};
  try{
    let err=null;
    if(editingId){const r=await DB.stock.update(editingId,data);err=r.error;}
    else{const r=await DB.stock.add(data);err=r.error;}
    if(err){showModalError('Hitilafu: '+(err.message||'Jaribu tena'));btn.innerHTML='<i class="ti ti-check"></i> Hifadhi Bidhaa';btn.style.pointerEvents='';return;}
    closeModal('modalBidhaa');resetForm();showToast(editingId?'Bidhaa imesasishwa! ✅':'Bidhaa imeongezwa! ✅');
    btn.innerHTML='<i class="ti ti-check"></i> Hifadhi Bidhaa';btn.style.pointerEvents='';
    await loadStock();
  }catch(e){showModalError('Hitilafu ya mtandao');btn.innerHTML='<i class="ti ti-check"></i> Hifadhi Bidhaa';btn.style.pointerEvents='';}
}

async function deleteBidhaa(id){if(!confirm('Futa bidhaa hii?'))return;await DB.stock.delete(id);showToast('Imefutwa!');await loadStock();}
function showModalError(msg){document.getElementById('modalErrorMsg').textContent=msg;document.getElementById('modalError').style.display='flex';}
function hideModalError(){document.getElementById('modalError').style.display='none';}
</script>
<nav class="bottom-nav">
  <a href="dashboard.html"><i class="ti ti-home"></i><span>Nyumbani</span></a>
  <a href="ai.html"><i class="ti ti-brand-openai"></i><span>AI</span></a>
  <a href="mauzo.html"><i class="ti ti-shopping-cart"></i><span>Mauzo</span></a>
  <a href="stock.html" class="active"><i class="ti ti-package"></i><span>Stock</span></a>
  <a href="mipangilio.html"><i class="ti ti-settings"></i><span>Zaidi</span></a>
</nav>
</body>
</html>
