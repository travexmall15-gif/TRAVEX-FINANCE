<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mauzo — TRAVEX Finance</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="shared.css">
<style>
.pos-grid{display:grid;grid-template-columns:1fr 360px;gap:20px;margin-bottom:24px;}
.pos-form{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:20px;}
.pos-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.pos-items{margin-bottom:16px;}
.pos-item-row{display:grid;grid-template-columns:1fr 70px 100px 80px 36px;gap:8px;align-items:center;margin-bottom:8px;}
.pos-item-row.header{margin-bottom:4px;}
.pos-item-row.header span{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}
.autocomplete-wrap{position:relative;}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--white);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-md);z-index:50;max-height:200px;overflow-y:auto;display:none;}
.autocomplete-list.open{display:block;}
.ac-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:13px;border-bottom:1px solid #f3f4f6;}
.ac-item:hover{background:var(--bg);}
.ac-item:last-child{border-bottom:none;}
.ac-item-name{font-weight:600;color:var(--navy);}
.ac-item-stock{font-size:11px;color:var(--text-muted);}
.ac-item-price{font-size:12px;color:var(--gold-dark);font-weight:600;}
.remove-btn{background:none;border:none;cursor:pointer;color:var(--danger);font-size:16px;display:flex;align-items:center;}
.pos-total-box{background:var(--navy);border-radius:10px;padding:16px;margin-bottom:14px;}
.pos-total-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.pos-total-row span{font-size:13px;color:rgba(255,255,255,0.6);}
.pos-total-row.big span:last-child{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;color:var(--gold);}
.payment-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.pay-btn{padding:10px 8px;border-radius:8px;border:2px solid var(--border);background:var(--white);font-size:12px;font-weight:600;color:var(--navy);cursor:pointer;text-align:center;transition:all 0.2s;}
.pay-btn.selected{border-color:var(--gold);background:#fffdf0;color:var(--navy);}
.pay-btn i{display:block;font-size:18px;margin-bottom:4px;}
</style>
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="main-wrapper">
  <div class="main-header">
    <div>
      <div class="header-title">Mauzo</div>
      <div class="header-sub">Rekodi mauzo, mapato na matumizi ya biashara yako</div>
    </div>
  </div>
  <div class="main-content">

    <div class="stats-grid" id="statsGrid"></div>

    <div class="tabs tab-group">
      <button class="tab-btn active" data-tab="tab-pos">Muamala Mpya</button>
      <button class="tab-btn" data-tab="tab-mapato">Mapato na Matumizi</button>
    </div>

    <!-- TAB 1: POS -->
    <div class="tab-content active" id="tab-pos">
      <div class="pos-grid">
        <div class="pos-form">
          <div class="pos-title"><i class="ti ti-shopping-cart"></i> Ingiza Muamala</div>

          <div class="pos-items" id="posItems"></div>
          <button class="btn btn-outline btn-sm" onclick="addItem()" style="margin-bottom:16px;width:100%">
            <i class="ti ti-plus"></i> Ongeza Bidhaa Nyingine
          </button>

          <div class="form-group">
            <label class="form-label">Maelezo (Si lazima)</label>
            <input type="text" class="form-control" id="fMaelezo" placeholder="Mfano: Muamala wa Amina">
          </div>
        </div>

        <div>
          <div class="pos-form">
            <div class="pos-title"><i class="ti ti-receipt"></i> Muhtasari wa Muamala</div>

            <div class="pos-total-box">
              <div class="pos-total-row"><span>Jumla ya Bidhaa</span><span id="totalItems" style="color:rgba(255,255,255,0.8)">0</span></div>
              <div class="pos-total-row big"><span>Jumla ya Malipo</span><span id="totalAmount">TZS 0</span></div>
            </div>

            <div style="margin-bottom:14px;">
              <div class="form-label" style="margin-bottom:10px">Njia ya Malipo</div>
              <div class="payment-btns">
                <div class="pay-btn selected" id="pay-cash" onclick="selectPay('cash')"><i class="ti ti-cash"></i>Taslimu</div>
                <div class="pay-btn" id="pay-mpesa" onclick="selectPay('mpesa')"><i class="ti ti-phone"></i>M-Pesa</div>
                <div class="pay-btn" id="pay-deni" onclick="selectPay('deni')"><i class="ti ti-credit-card"></i>Deni</div>
              </div>
            </div>

            <div class="form-group" id="deniFields" style="display:none">
              <label class="form-label">Jina la Mdeni</label>
              <input type="text" class="form-control" id="fDeniJina" placeholder="Jina la mtu anayedaiwa">
              <label class="form-label" style="margin-top:10px">Namba ya Simu</label>
              <input type="text" class="form-control" id="fDeniSimu" placeholder="+255 7XX XXX XXX">
            </div>

            <button class="btn btn-gold" style="width:100%;padding:13px;font-size:15px;justify-content:center;" onclick="submitMuamala()">
              <i class="ti ti-check"></i> Maliza Muamala
            </button>
            <button class="btn btn-outline" style="width:100%;margin-top:8px;padding:10px;justify-content:center;" onclick="clearForm()">
              <i class="ti ti-x"></i> Futa
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB 2: MAPATO/MATUMIZI -->
    <div class="tab-content" id="tab-mapato">
      <div class="filter-row">
        <button class="filter-btn active" onclick="filterPeriod('leo',this)">Leo</button>
        <button class="filter-btn" onclick="filterPeriod('wiki',this)">Wiki</button>
        <button class="filter-btn" onclick="filterPeriod('mwezi',this)">Mwezi</button>
        <button class="filter-btn" onclick="filterPeriod('mwaka',this)">Mwaka</button>
      </div>

      <div class="stats-grid" id="periodStats"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="table-card">
          <div class="table-card-header">
            <div>
              <div class="table-card-title" style="color:var(--success)">📈 Mapato</div>
            </div>
            <button class="btn btn-gold btn-sm" onclick="openMatumiziModal('mapato')">+ Ongeza</button>
          </div>
          <table id="mapatoTable">
            <thead><tr><th>Bidhaa</th><th>Tarehe</th><th class="text-right">Jumla</th></tr></thead>
            <tbody id="mapatoBody"></tbody>
          </table>
        </div>
        <div class="table-card">
          <div class="table-card-header">
            <div>
              <div class="table-card-title" style="color:var(--danger)">📉 Matumizi</div>
            </div>
            <button class="btn btn-navy btn-sm" onclick="openMatumiziModal('matumizi')">+ Ongeza</button>
          </div>
          <table id="matumiziTable">
            <thead><tr><th>Maelezo</th><th>Tarehe</th><th class="text-right">Jumla</th></tr></thead>
            <tbody id="matumiziBody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL: Ongeza Mapato/Matumizi -->
<div class="modal-overlay" id="modalMapato">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalMapatoTitle">Ongeza Mapato</div>
      <button class="modal-close" onclick="closeModal('modalMapato')"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-group">
      <label class="form-label">Maelezo *</label>
      <input type="text" class="form-control" id="mfMaelezo" placeholder="Mfano: Mauzo ya unga">
    </div>
    <div class="form-group">
      <label class="form-label">Kiasi (TZS) *</label>
      <input type="number" class="form-control" id="mfKiasi" placeholder="0">
    </div>
    <div class="form-group">
      <label class="form-label">Tarehe</label>
      <input type="date" class="form-control" id="mfTarehe">
    </div>
    <button class="btn btn-gold" style="width:100%;justify-content:center;padding:12px" onclick="saveMapato()">
      <i class="ti ti-check"></i> Hifadhi
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
(async()=>{const s=await Auth.getSession();if(!s)window.location.replace("login.html");})();
loadSidebar('mauzo');
initTabs();

let items = [];
let payMethod = 'cash';
let currentAina = 'mapato';
let currentPeriod = 'leo';

document.getElementById('mfTarehe').value = today();

// Build stats
function buildStats() {
  const mauzo = DB.get('mauzo');
  const todayMap = mauzo.filter(m => m.tarehe === today());
  const mapato = todayMap.filter(m => m.aina === 'mapato').reduce((a,m)=>a+m.jumla,0);
  const matumizi = todayMap.filter(m => m.aina === 'matumizi').reduce((a,m)=>a+m.jumla,0);
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Mapato Leo</div><div class="stat-value">${formatTZS(mapato)}</div><div class="stat-sub">Jumla ya mauzo</div></div>
    <div class="stat-card"><div class="stat-label">Matumizi Leo</div><div class="stat-value">${formatTZS(matumizi)}</div><div class="stat-sub">Jumla ya gharama</div></div>
    <div class="stat-card"><div class="stat-label">Faida Leo</div><div class="stat-value" style="color:${mapato-matumizi>=0?'var(--gold)':'#ef4444'}">${formatTZS(mapato-matumizi)}</div><div class="stat-sub">Mapato - Matumizi</div></div>
    <div class="stat-card"><div class="stat-label">Miamala Leo</div><div class="stat-value">${todayMap.length}</div><div class="stat-sub">Idadi ya rekodi</div></div>
  `;
}
buildStats();

// POS ITEMS
function renderItems() {
  const stock = DB.get('stock');
  document.getElementById('posItems').innerHTML = items.map((item,i) => `
    <div class="pos-item-row">
      <div class="autocomplete-wrap">
        <input class="form-control" placeholder="Andika bidhaa..." value="${item.bidhaa}" oninput="searchBidhaa(${i},this.value)" id="bidhaaInput${i}" autocomplete="off">
        <div class="autocomplete-list" id="acList${i}"></div>
      </div>
      <input class="form-control" type="number" min="1" value="${item.idadi}" oninput="updateItem(${i},'idadi',this.value)" placeholder="Idadi">
      <input class="form-control" type="number" value="${item.bei}" oninput="updateItem(${i},'bei',this.value)" placeholder="Bei">
      <div style="font-size:13px;font-weight:700;color:var(--navy);text-align:right">${formatTZS(item.idadi*item.bei)}</div>
      <button class="remove-btn" onclick="removeItem(${i})"><i class="ti ti-trash"></i></button>
    </div>
  `).join('');
  updateTotals();
}

function addItem() {
  items.push({bidhaa:'',idadi:1,bei:0,stockId:null});
  renderItems();
}

function removeItem(i) { items.splice(i,1); renderItems(); }

function updateItem(i,field,val) {
  items[i][field] = field==='idadi'||field==='bei' ? parseFloat(val)||0 : val;
  if(field!=='bidhaa') updateTotals();
}

function updateTotals() {
  const total = items.reduce((a,item)=>a+(item.idadi*item.bei),0);
  document.getElementById('totalItems').textContent = items.reduce((a,item)=>a+item.idadi,0);
  document.getElementById('totalAmount').textContent = formatTZS(total);
}

function searchBidhaa(i, val) {
  const stock = DB.get('stock');
  const list = document.getElementById('acList' + i);
  items[i].bidhaa = val;
  if (!val || val.length < 1) { list.classList.remove('open'); return; }
  const filtered = stock.filter(s => s.jina.toLowerCase().includes(val.toLowerCase()));
  if (filtered.length === 0) { list.classList.remove('open'); return; }
  list.innerHTML = filtered.map(s => `
    <div class="ac-item" onclick="selectBidhaa(${i},${JSON.stringify(s).replace(/"/g,'&quot;')})">
      <div><div class="ac-item-name">${s.jina}</div><div class="ac-item-stock">Imebaki: ${s.idadi}</div></div>
      <div class="ac-item-price">${formatTZS(s.bei_kuuza)}</div>
    </div>`).join('');
  list.classList.add('open');
}

function selectBidhaa(i, s) {
  items[i] = {...items[i], bidhaa:s.jina, bei:s.bei_kuuza, stockId:s.id};
  document.getElementById('acList'+i).classList.remove('open');
  renderItems();
}

function selectPay(method) {
  payMethod = method;
  document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('pay-'+method).classList.add('selected');
  document.getElementById('deniFields').style.display = method==='deni'?'block':'none';
}

function submitMuamala() {
  if (items.length===0 || items.every(i=>!i.bidhaa)) { showToast('Ongeza bidhaa angalau moja','error'); return; }
  const mauzo = items.filter(i=>i.bidhaa).map(item => ({
    bidhaa: item.bidhaa,
    idadi: item.idadi,
    bei: item.bei,
    jumla: item.idadi * item.bei,
    aina: 'mapato',
    malipo: payMethod,
    tarehe: today(),
    maelezo: document.getElementById('fMaelezo').value
  }));

  mauzo.forEach(m => {
    DB.add('mauzo', m);
    // Punguza stock
    const stock = DB.get('stock');
    const si = stock.findIndex(s => s.jina === m.bidhaa);
    if (si !== -1) { DB.update('stock', stock[si].id, {idadi: Math.max(0, stock[si].idadi - m.idadi)}); }
  });

  // Kama ni deni — ongeza madeni
  if (payMethod === 'deni') {
    const jina = document.getElementById('fDeniJina').value.trim();
    if (jina) {
      DB.add('madeni', {
        jina, simu: document.getElementById('fDeniSimu').value.trim(),
        aina: 'unaodai',
        kiasi: mauzo.reduce((a,m)=>a+m.jumla,0),
        tarehe: today(), maelezo: 'Deni kutoka mauzo'
      });
    }
  }

  showToast('Muamala umehifadhiwa! 🎉');
  items = [];
  document.getElementById('fMaelezo').value = '';
  renderItems();
  buildStats();
  loadPeriodData();
}

function clearForm() { items = []; document.getElementById('fMaelezo').value=''; renderItems(); }

// MAPATO/MATUMIZI TABLE
function filterPeriod(period, btn) {
  currentPeriod = period;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadPeriodData();
}

function loadPeriodData() {
  const all = DB.get('mauzo');
  const now = new Date();
  let filtered = all;

  if (currentPeriod === 'leo') {
    filtered = all.filter(m => m.tarehe === today());
  } else if (currentPeriod === 'wiki') {
    const start = new Date(now); start.setDate(start.getDate() - 7);
    filtered = all.filter(m => new Date(m.tarehe) >= start);
  } else if (currentPeriod === 'mwezi') {
    filtered = all.filter(m => {
      const d = new Date(m.tarehe);
      return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    });
  } else {
    filtered = all.filter(m => new Date(m.tarehe).getFullYear()===now.getFullYear());
  }

  const mapato = filtered.filter(m=>m.aina==='mapato');
  const matumizi = filtered.filter(m=>m.aina==='matumizi');
  const totalMapato = mapato.reduce((a,m)=>a+m.jumla,0);
  const totalMatumizi = matumizi.reduce((a,m)=>a+m.jumla,0);

  document.getElementById('periodStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Jumla Mapato</div><div class="stat-value">${formatTZS(totalMapato)}</div><div class="stat-sub">${mapato.length} rekodi</div></div>
    <div class="stat-card"><div class="stat-label">Jumla Matumizi</div><div class="stat-value">${formatTZS(totalMatumizi)}</div><div class="stat-sub">${matumizi.length} rekodi</div></div>
    <div class="stat-card"><div class="stat-label">Faida</div><div class="stat-value" style="color:${totalMapato-totalMatumizi>=0?'var(--gold)':'#ef4444'}">${formatTZS(totalMapato-totalMatumizi)}</div><div class="stat-sub">Jumla</div></div>
  `;

  const emptyRow = '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);padding:20px">Hakuna rekodi</td></tr>';
  document.getElementById('mapatoBody').innerHTML = mapato.length ? mapato.reverse().map(m=>`<tr>
    <td class="text-navy">${m.bidhaa}</td><td class="text-muted">${formatDate(m.tarehe)}</td>
    <td class="text-right font-bold text-success">${formatTZS(m.jumla)}</td></tr>`).join('') : emptyRow;
  document.getElementById('matumiziBody').innerHTML = matumizi.length ? matumizi.reverse().map(m=>`<tr>
    <td class="text-navy">${m.bidhaa||m.maelezo}</td><td class="text-muted">${formatDate(m.tarehe)}</td>
    <td class="text-right font-bold text-danger">${formatTZS(m.jumla)}</td></tr>`).join('') : emptyRow;
}
loadPeriodData();

function openMatumiziModal(aina) {
  currentAina = aina;
  document.getElementById('modalMapatoTitle').textContent = aina==='mapato'?'Ongeza Mapato':'Ongeza Matumizi';
  document.getElementById('mfMaelezo').value='';
  document.getElementById('mfKiasi').value='';
  document.getElementById('mfTarehe').value=today();
  openModal('modalMapato');
}

function saveMapato() {
  const maelezo = document.getElementById('mfMaelezo').value.trim();
  const kiasi = parseFloat(document.getElementById('mfKiasi').value)||0;
  const tarehe = document.getElementById('mfTarehe').value;
  if (!maelezo||!kiasi) { showToast('Jaza taarifa zote','error'); return; }
  DB.add('mauzo',{bidhaa:maelezo,idadi:1,bei:kiasi,jumla:kiasi,aina:currentAina,tarehe,maelezo:''});
  closeModal('modalMapato');
  showToast('Imehifadhiwa!');
  buildStats();
  loadPeriodData();
}

// Init first item
addItem();
</script>

<a href="invoice.html" class=""><i class="ti ti-file-invoice"></i><span>Invoice</span></a>
<a href="ripoti.html" class=""><i class="ti ti-chart-bar"></i><span>Ripoti</span></a>
<a href="mipangilio.html" class=""><i class="ti ti-settings"></i><span>Zaidi</span></a>
</nav>
</body>
</html>
