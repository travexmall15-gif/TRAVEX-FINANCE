<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rudisha Neno la Siri — Q360 AI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0a0f1e;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:36px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:28px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#00d4ff,#FFD700);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#0a0f1e;font-family:'Plus Jakarta Sans',sans-serif}
.logo-text{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:800;color:#0a0f1e}
.logo-text span{color:#00d4ff}
h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;color:#1a2332;margin-bottom:6px}
p{font-size:13px;color:#9ca3af;margin-bottom:24px;line-height:1.6}
.form-group{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:600;color:#1a2332;margin-bottom:6px}
input{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;color:#1a2332;outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.2s}
input:focus{border-color:#00d4ff}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#111827,#1a2332);color:#fff;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;margin-bottom:14px}
.btn:hover{opacity:0.9}
.back{display:block;text-align:center;font-size:13px;color:#6b7280}
.back a{color:#1a2332;font-weight:700}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;align-items:center;gap:8px}
.alert.show{display:flex}
.alert-success{background:#d1fae5;border:1px solid #6ee7b7;color:#065f46}
.alert-error{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo" onclick="location.href='index.html'" style="cursor:pointer">
    <div class="logo-icon">Q3</div>
    <div class="logo-text">Q360<span> AI</span></div>
  </div>
  <h2>Rudisha Neno la Siri</h2>
  <p>Ingiza email yako. Tutakutumia kiungo cha kubadilisha neno la siri.</p>

  <div class="alert alert-success" id="alertSuccess"><i class="ti ti-check"></i><span id="successMsg"></span></div>
  <div class="alert alert-error" id="alertError"><i class="ti ti-alert-circle"></i><span id="errorMsg"></span></div>

  <div class="form-group" id="emailGroup">
    <label>Barua Pepe (Email)</label>
    <input type="email" id="fEmail" placeholder="mfano@email.com" autocomplete="email">
  </div>
  <button class="btn" id="submitBtn" onclick="doReset()">
    <i class="ti ti-send"></i> Tuma Kiungo
  </button>
  <div class="back"><a href="login.html"><i class="ti ti-arrow-left" style="vertical-align:middle"></i> Rudi Kuingia</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
async function doReset() {
  const email = document.getElementById('fEmail').value.trim();
  if (!email) { showError('Ingiza email yako'); return; }
  const btn = document.getElementById('submitBtn');
  btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 0.8s linear infinite"></i> Inatuma...';
  btn.style.pointerEvents = 'none';
  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: `${window.location.origin}/mipangilio.html`
  });
  if (error) {
    btn.innerHTML = '<i class="ti ti-send"></i> Tuma Kiungo';
    btn.style.pointerEvents = '';
    showError(error.message);
    return;
  }
  document.getElementById('emailGroup').style.display = 'none';
  btn.style.display = 'none';
  document.getElementById('successMsg').textContent = `Kiungo kimetumwa kwa ${email}. Angalia inbox yako (na spam folder).`;
  document.getElementById('alertSuccess').classList.add('show');
}
function showError(msg) { document.getElementById('errorMsg').textContent = msg; document.getElementById('alertError').classList.add('show'); }
</script>
</body>
</html>
