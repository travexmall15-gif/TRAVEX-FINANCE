<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingia — Q360 AI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0a0f1e;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}

.card{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.card-logo{display:flex;align-items:center;gap:8px;margin-bottom:28px;cursor:pointer}
.logo-sq{width:30px;height:30px;background:linear-gradient(135deg,#00d4ff,#FFD700);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#0a0f1e;font-family:'Plus Jakarta Sans',sans-serif}
.logo-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:800;color:#0a0f1e}
.logo-name span{color:#00d4ff}
h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;color:#0a0f1e;margin-bottom:4px}
.sub{font-size:13px;color:#9ca3af;margin-bottom:24px}

.form-group{margin-bottom:14px}
label{display:block;font-size:13px;font-weight:600;color:#0a0f1e;margin-bottom:5px}
.inp-wrap{position:relative}
input{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;color:#0a0f1e;background:#fff;outline:none;transition:border-color 0.2s;font-family:'DM Sans',sans-serif}
input:focus{border-color:#00d4ff}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;font-size:16px;padding:2px}

.forgot{display:block;text-align:right;font-size:12px;color:#6b7280;font-weight:600;margin-top:4px;margin-bottom:16px;cursor:pointer}
.forgot:hover{color:#0a0f1e}

.btn-main{width:100%;padding:13px;background:#0a0f1e;color:#fff;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;margin-bottom:12px}
.btn-main:hover{opacity:0.9}
.btn-main:disabled{opacity:0.6;cursor:not-allowed}

.divider{display:flex;align-items:center;gap:10px;margin:14px 0}
.divider span{font-size:12px;color:#9ca3af;white-space:nowrap}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}

.btn-google{width:100%;padding:12px;background:#fff;color:#0a0f1e;border-radius:10px;font-size:14px;font-weight:600;border:1.5px solid #e5e7eb;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:9px;transition:all 0.2s}
.btn-google:hover{background:#f9fafb}
.btn-google img{width:18px;height:18px}

.err{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;border-radius:8px;padding:10px 14px;font-size:13px;display:none;align-items:center;gap:8px;margin-bottom:14px}
.err.show{display:flex}

.signup-row{text-align:center;font-size:13px;color:#9ca3af;margin-top:16px}
.signup-row a{color:#0a0f1e;font-weight:700;cursor:pointer}
.signup-row a:hover{color:#00d4ff}

@keyframes spin{to{transform:rotate(360deg)}}

/* Loader overlay */
.overlay{position:fixed;inset:0;background:#0a0f1e;display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity 0.3s}
.overlay.off{opacity:0;pointer-events:none}
.ov-txt{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;color:#00d4ff;text-align:center}
.ov-spin{width:28px;height:28px;border:2.5px solid rgba(0,212,255,0.2);border-top-color:#00d4ff;border-radius:50%;animation:spin 0.7s linear infinite;margin:14px auto 0}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div><div class="ov-txt">Q360 AI</div><div class="ov-spin"></div></div>
</div>

<div class="card" id="mainCard" style="display:none">
  <div class="card-logo" onclick="location.href='index.html'">
    <div class="logo-sq">Q3</div>
    <div class="logo-name">Q360<span> AI</span></div>
  </div>

  <h2>Karibu Tena</h2>
  <p class="sub">Ingia kwenye akaunti yako</p>

  <div class="err" id="errBox"><i class="ti ti-alert-circle"></i><span id="errMsg"></span></div>

  <button class="btn-google" onclick="doGoogle()" id="googleBtn">
    <img src="https://www.google.com/favicon.ico" alt="G"> Endelea na Google
  </button>

  <div class="divider"><span>au</span></div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="fEmail" placeholder="mfano@email.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Neno la Siri</label>
    <div class="inp-wrap">
      <input type="password" id="fPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="eye" onclick="toggleEye()" type="button"><i class="ti ti-eye" id="eyeIco"></i></button>
    </div>
  </div>
  <a class="forgot" onclick="location.href='reset.html'">Umesahau neno la siri?</a>

  <button class="btn-main" id="loginBtn" onclick="doLogin()">
    <i class="ti ti-login"></i> Ingia
  </button>

  <div class="signup-row">Huna akaunti? <a onclick="location.href='signup.html'">Jiandikishe Bure</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
(async () => {
  const session = await Auth.getSession();
  if (session) { window.location.replace('ai.html'); return; }
  document.getElementById('overlay').classList.add('off');
  document.getElementById('mainCard').style.display = 'block';
  // Check for OAuth return
  if (window.location.hash.includes('access_token')) window.location.replace('ai.html');
})();

function toggleEye() {
  const i = document.getElementById('fPass');
  const ic = document.getElementById('eyeIco');
  i.type = i.type === 'password' ? 'text' : 'password';
  ic.className = i.type === 'password' ? 'ti ti-eye' : 'ti ti-eye-off';
}

async function doGoogle() {
  const btn = document.getElementById('googleBtn');
  btn.innerHTML = '<div style="width:16px;height:16px;border:2px solid #e5e7eb;border-top-color:#0a0f1e;border-radius:50%;animation:spin 0.7s linear infinite"></div> Inaelekeza...';
  btn.disabled = true;
  await Auth.loginWithGoogle();
}

async function doLogin() {
  const email = document.getElementById('fEmail').value.trim();
  const pass  = document.getElementById('fPass').value;
  if (!email || !pass) { showErr('Jaza email na neno la siri'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 0.7s linear infinite"></i> Inaingia...';

  const { error } = await Auth.login(email, pass);

  if (error) {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-login"></i> Ingia';
    if (error.message.includes('not confirmed')) showErr('Thibisha email yako kwanza — angalia inbox');
    else if (error.message.includes('Invalid')) showErr('Email au neno la siri si sahihi');
    else showErr(error.message);
    return;
  }

  // ✅ Redirect moja kwa moja
  window.location.replace('ai.html');
}

function showErr(msg) {
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('errBox').classList.add('show');
}
</script>
</body>
</html>
